<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="体調ログ">
<meta name="theme-color" content="#0F1418">
<title>体調ログ</title>


<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1418; --surface:#171E24; --surface-2:#1F282F; --line:#2B3740;
  --ink:#E6E2D7; --ink-dim:#8B9AA3; --calm:#5FA8A0; --focus:#7FD1C6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Zen Kaku Gothic New",-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  font-size:16px;line-height:1.6;padding:20px 16px 56px;max-width:560px;margin:0 auto;min-height:100vh;
}
header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:22px}
h1{font-size:19px;font-weight:700;letter-spacing:.14em;margin:0}
.sub{font-size:11px;letter-spacing:.22em;color:var(--ink-dim)}

.datebar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
input[type=date]{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:11px 12px;font-size:15px;font-family:"Roboto Mono",monospace}
.saved-flag{font-size:11px;letter-spacing:.1em;color:var(--calm);white-space:nowrap;opacity:0}
.saved-flag.on{opacity:1}
.legend{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-dim);
  letter-spacing:.1em;margin:0 2px 14px}

.metric{border-top:1px solid var(--line);padding:18px 0 16px}
.metric:first-of-type{border-top:none}
.mhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px}
.mname{font-size:15px;font-weight:500;white-space:nowrap}
.mval{font-size:12px;color:var(--ink-dim);text-align:right}
.mval b{font-family:"Roboto Mono",monospace;font-size:15px;font-weight:500;color:var(--ink);margin-right:6px}

.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.seg{height:46px;border:1px solid var(--line);background:var(--surface);border-radius:8px;
  color:var(--ink-dim);font-family:"Roboto Mono",monospace;font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .16s ease,color .16s ease,border-color .16s ease,transform .1s ease}
.seg:active{transform:scale(.96)}
.seg:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.seg.fill{color:#0F1418;font-weight:500;border-color:transparent}

.spark{display:flex;gap:2px;height:18px;margin-top:10px;align-items:flex-end}
.spark i{flex:1;background:var(--surface-2);border-radius:1px;min-height:2px}

.extras{border-top:1px solid var(--line);padding-top:18px;margin-top:6px;display:grid;gap:12px}
label.f{display:grid;gap:6px;font-size:13px;color:var(--ink-dim)}
input[type=number],textarea{background:var(--surface);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;width:100%}
input[type=number]{font-family:"Roboto Mono",monospace}
textarea{resize:vertical;min-height:64px}
.drink{display:grid;gap:10px}
.step{display:grid;grid-template-columns:1fr 48px 42px 48px;align-items:center;gap:6px}
.step .dl{font-size:14px;color:var(--ink-dim)}
.step b{font-family:"Roboto Mono",monospace;font-size:17px;font-weight:500;text-align:center}
.mn{height:44px;background:var(--surface);border:1px solid var(--line);color:var(--ink);
  border-radius:10px;font-size:18px;font-family:inherit;cursor:pointer}
.mn:active{transform:scale(.94)}
.unit{position:absolute;right:12px;bottom:11px;font-size:13px;color:var(--ink-dim);pointer-events:none}
.alc{margin:-4px 0 0;font-size:12px;color:var(--ink-dim);font-family:"Roboto Mono",monospace}
.gym{display:grid;grid-template-columns:1fr 96px;gap:12px;align-items:end}
.gym label{position:relative}
.gym input{padding-right:30px}
#gymBtn{background:var(--surface);border:1px solid var(--line);color:var(--ink-dim);
  border-radius:10px;padding:13px;font-size:15px;font-family:inherit;cursor:pointer;width:100%}
#gymBtn[aria-pressed="true"]{background:#5FA8A0;border-color:transparent;color:#0B1112;font-weight:700}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px}

.actions{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:24px}
button.primary{background:var(--calm);color:#0B1112;border:none;border-radius:10px;padding:15px;
  font-size:15px;font-weight:700;font-family:inherit;letter-spacing:.06em;cursor:pointer}
button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:10px;
  padding:15px 18px;font-size:14px;font-family:inherit;cursor:pointer}
button.sm{padding:8px 12px;font-size:13px}
button:active{transform:scale(.985)}

.log{margin-top:34px;border-top:1px solid var(--line);padding-top:18px}
.log h2{font-size:11px;letter-spacing:.22em;color:var(--ink-dim);margin:0 0 12px;font-weight:500}
.row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--surface-2);font-size:14px}
.row .d{font-family:"Roboto Mono",monospace;color:var(--ink-dim);font-size:13px;width:74px;flex:none}
.dots{display:flex;gap:4px}
.dots i{width:9px;height:9px;border-radius:50%;display:block}
.row .m{color:var(--ink-dim);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{color:var(--ink-dim);font-size:13px;padding:8px 0}
.note{color:var(--ink-dim);font-size:12px;margin-top:20px;line-height:1.7}

#toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,16px);
  background:#5FA8A0;color:#0B1112;font-weight:700;font-size:14px;
  padding:12px 20px;border-radius:999px;opacity:0;pointer-events:none;
  transition:opacity .2s ease,transform .2s ease;z-index:20}
#toast.show{opacity:1;transform:translate(-50%,0)}

#sheet{position:fixed;inset:0;background:rgba(8,11,13,.82);display:flex;align-items:flex-end;justify-content:center;z-index:10}
#sheet[hidden]{display:none}
.sheet-inner{background:var(--surface);border:1px solid var(--line);border-radius:16px 16px 0 0;
  padding:18px 16px calc(22px + env(safe-area-inset-bottom));width:100%;max-width:560px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#mdout{height:40vh;font-family:"Roboto Mono",monospace;font-size:12px;line-height:1.5;white-space:pre}
.sheet-actions{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px}
</style>
</head>
<body>

<header>
  <h1>体調ログ</h1>
  <button class="ghost sm" id="quick">保存</button>
</header>

<div class="datebar">
  <input type="date" id="date">
  <span class="saved-flag" id="flag">保存済み</span>
</div>
<div class="legend"><span>← つらい</span><span>快調 →</span></div>

<div id="metrics"></div>

<div class="extras">
  <div class="drink">
    <div class="step" data-t="b350">
      <span class="dl">ビール 350ml</span>
      <button type="button" class="mn" data-d="-1" aria-label="350ml を減らす">−</button>
      <b id="b350">0</b>
      <button type="button" class="mn" data-d="1" aria-label="350ml を増やす">＋</button>
    </div>
    <div class="step" data-t="b500">
      <span class="dl">ビール 500ml</span>
      <button type="button" class="mn" data-d="-1" aria-label="500ml を減らす">−</button>
      <b id="b500">0</b>
      <button type="button" class="mn" data-d="1" aria-label="500ml を増やす">＋</button>
    </div>
  </div>
  <p class="alc" id="alc">飲酒なし</p>
  <div class="gym">
    <button id="gymBtn" type="button" aria-pressed="false">ジムに行った</button>
    <label class="f"><input type="number" id="gymMin" step="5" min="0" inputmode="numeric" placeholder="60"><span class="unit">分</span></label>
  </div>
  <label class="f">メモ<textarea id="memo" placeholder="会議が多かった / 夕方から頭痛 など"></textarea></label>
</div>

<div class="actions">
  <button class="primary" id="save">この日を記録する</button>
  <button class="ghost" id="export">.md</button>
</div>

<div class="log">
  <h2>RECENT</h2>
  <div id="history"></div>
</div>

<div id="sheet" hidden>
  <div class="sheet-inner">
    <div class="sheet-head">
      <span class="sub">MARKDOWN</span>
      <button class="ghost sm" id="close">閉じる</button>
    </div>
    <textarea id="mdout" readonly></textarea>
    <div class="sheet-actions">
      <button class="primary" id="copy">コピー</button>
      <button class="ghost" id="dl">共有・保存</button>
    </div>
    <p class="note" style="margin-top:12px">コピー後、メモアプリやファイルアプリの iCloud Drive に貼り付けても保存できます。</p>
  </div>
</div>

<p class="note">1＝つらい 〜 5＝快調。記録は端末に保存されます。</p>

<script>
const METRICS=[
  {k:'eye',   n:'目・肩', h:['作業できない','ずっと痛い','夕方つらい','少し疲れる','すっきり']},
  {k:'awake', n:'やる気', h:['まったく出ない','取りかかれない','惰性で進む','ふつうに動ける','前向きに動ける']},
  {k:'mood',  n:'気分', h:['何も手につかない','つらい','気力が出ない','やや沈む','安定している']},
  {k:'sleep', n:'睡眠', h:['ほぼ眠れない','浅い','途中で起きる','まずまず','ぐっすり']}
];
const COLORS=['#D2685A','#C9A227','#8FAE6A','#5FA8A0','#7FD1C6']; // 1→5
const col=v=>COLORS[v-1];
const KEY='taicho-logs';

let data={}, cur={};
const $=id=>document.getElementById(id);
const today=()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)};

async function load(){
  try{const v=localStorage.getItem(KEY); data=v?JSON.parse(v):{}}
  catch(e){data={}}
}
async function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(data))}
  catch(e){alert('保存できませんでした。プライベートブラウズをオフにしてお試しください。')}
}

function buildMetrics(){
  $('metrics').innerHTML=METRICS.map(m=>`
    <div class="metric" data-k="${m.k}">
      <div class="mhead"><span class="mname">${m.n}</span><span class="mval" id="v-${m.k}">未入力</span></div>
      <div class="scale">${[1,2,3,4,5].map(i=>`<button class="seg" data-k="${m.k}" data-v="${i}" aria-label="${m.n} ${i} ${m.h[i-1]}">${i}</button>`).join('')}</div>
      <div class="spark" id="s-${m.k}"></div>
    </div>`).join('');
  $('metrics').addEventListener('click',e=>{
    const b=e.target.closest('.seg'); if(!b) return;
    cur[b.dataset.k]=+b.dataset.v; paintMetrics();
  });
}
function paintMetrics(){
  METRICS.forEach(m=>{
    const v=cur[m.k];
    document.querySelectorAll(`.seg[data-k="${m.k}"]`).forEach(b=>{
      const on=v!=null&&+b.dataset.v===v;
      b.classList.toggle('fill',on);
      b.style.background=on?col(v):'';
    });
    $('v-'+m.k).innerHTML = v==null?'未入力':`<b>${v}</b>${m.h[v-1]}`;
    const days=lastDays(14).map(d=>data[d]&&data[d][m.k]);
    $('s-'+m.k).innerHTML=days.map(x=>
      x==null?`<i style="height:2px"></i>`:`<i style="height:${x*3}px;background:${col(x)}"></i>`).join('');
  });
}
function lastDays(n){
  const base=new Date($('date').value||today()),out=[];
  for(let i=n-1;i>=0;i--){const d=new Date(base);d.setDate(d.getDate()-i);
    d.setMinutes(d.getMinutes()-d.getTimezoneOffset());out.push(d.toISOString().slice(0,10))}
  return out;
}
function loadDay(){
  const e=data[$('date').value]||{};
  cur={}; METRICS.forEach(m=>{if(e[m.k]!=null)cur[m.k]=e[m.k]});
  $('b350').textContent=e.b350??0; $('b500').textContent=e.b500??0; $('memo').value=e.memo??'';
  $('gymBtn').setAttribute('aria-pressed',String(!!e.gym));
  $('gymMin').value=e.gymMin??'';
  paintAlc();
  $('flag').classList.toggle('on',!!data[$('date').value]);
  paintMetrics();
}
function alcGrams(n350,n500){return Math.round(((n350*350+n500*500)*0.05*0.8)*10)/10}
function beer(){return {a:+$('b350').textContent||0, b:+$('b500').textContent||0}}
function paintAlc(){
  const {a,b}=beer(), g=alcGrams(a,b);
  $('alc').textContent = g===0 ? '飲酒なし'
    : `${a*350+b*500} ml ／ 純アルコール 約 ${g} g（1単位 = 20g）`;
}
document.querySelector('.drink').addEventListener('click',e=>{
  const btn=e.target.closest('.mn'); if(!btn) return;
  const id=btn.closest('.step').dataset.t;
  const next=Math.max(0,(+$(id).textContent||0)+(+btn.dataset.d));
  $(id).textContent=next; paintAlc();
});

$('gymBtn').addEventListener('click',()=>{
  const on=$('gymBtn').getAttribute('aria-pressed')==='true';
  $('gymBtn').setAttribute('aria-pressed',String(!on));
  if(on)$('gymMin').value='';
});

function paintHistory(){
  const keys=Object.keys(data).sort().reverse().slice(0,14);
  $('history').innerHTML = keys.length? keys.map(d=>{
    const e=data[d];
    return `<div class="row"><span class="d">${d.slice(5)}</span>
      <span class="dots">${METRICS.map(m=>`<i style="background:${e[m.k]!=null?col(e[m.k]):'#2B3740'}"></i>`).join('')}</span>
      <span class="m">${(e.memo||'').slice(0,20)}</span></div>`;
  }).join('') : '<div class="empty">まだ記録がありません。</div>';
}

$('save').addEventListener('click',async()=>{
  const d=$('date').value; if(!d) return;
  const e={};
  METRICS.forEach(m=>{if(cur[m.k]!=null)e[m.k]=cur[m.k]});
  const bb=beer();
  if(bb.a)e.b350=bb.a;
  if(bb.b)e.b500=bb.b;
  if($('gymBtn').getAttribute('aria-pressed')==='true'){
    e.gym=1;
    if($('gymMin').value!=='')e.gymMin=+$('gymMin').value;
  }
  if($('memo').value.trim())e.memo=$('memo').value.trim();
  data[d]=e; await persist();
  $('flag').classList.add('on'); paintHistory(); paintMetrics();
  toast(`${d} を記録しました`);
});
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t)}
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200);
}

function buildMd(){
  const keys=Object.keys(data).sort();
  if(!keys.length) return null;
  const esc=s=>String(s).replace(/\|/g,'\\|').replace(/\n/g,' ');
  const rows=keys.map(d=>{const e=data[d];
    const g=alcGrams(e.b350||0,e.b500||0);
    return `| ${d} | ${e.eye??'-'} | ${e.awake??'-'} | ${e.mood??'-'} | ${e.sleep??'-'} | ${e.gym?(e.gymMin?e.gymMin+'分':'○'):'-'} | ${e.b350??0} | ${e.b500??0} | ${g} | ${esc(e.memo??'')} |`});
  return [
    '# 体調ログ','',
    `更新日: ${today()} ／ 記録日数: ${keys.length}日`,'',
    '評価は 1＝つらい 〜 5＝快調（数値が大きいほど良い）',
    '純アルコール量はビール5%として算出（1単位 = 20g）','',
    '| 日付 | 目・肩 | やる気 | 気分 | 睡眠 | ジム | 350ml | 500ml | 純ALC g | メモ |',
    '| --- | --: | --: | --: | --: | :-: | --: | --: | --: | --- |',
    ...rows,''
  ].join('\n');
}
async function shareMd(md){
  const name=`taicho-log_${today()}.md`;
  const file=new File([md],name,{type:'text/markdown'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file]}); return}catch(err){if(err.name==='AbortError')return}
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown;charset=utf-8'}));
  a.download=name; a.rel='noopener'; a.click();
}

$('quick').addEventListener('click',()=>{
  const md=buildMd();
  if(!md){toast('記録がまだありません');return}
  shareMd(md);
});

$('export').addEventListener('click',()=>{
  const md=buildMd();
  if(!md){toast('記録がまだありません');return}
  $('mdout').value=md;
  $('sheet').hidden=false;
  $('copy').textContent='コピー';
  $('dl').onclick=()=>shareMd(md);
  $('copy').onclick=async()=>{
    try{await navigator.clipboard.writeText(md)}
    catch(err){$('mdout').select();document.execCommand('copy')}
    $('copy').textContent='コピーしました';
  };
});
$('close').addEventListener('click',()=>{$('sheet').hidden=true});
$('date').addEventListener('change',loadDay);

(async()=>{
  $('date').value=today();
  buildMetrics();
  await load();
  loadDay(); paintHistory();
})();
</script>
</body>
</html>
